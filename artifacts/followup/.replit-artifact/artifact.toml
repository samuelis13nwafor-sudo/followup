kind = "web"
previewPath = "/"
title = "FollowUp"
version = "1.0.0"
id = "artifacts/followup"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25640

[services.development]
run = "pnpm --filter @workspace/followup run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/followup", "run", "build" ]
publicDir = "artifacts/followup/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25640"
BASE_PATH = "/"
